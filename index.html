<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>@reicdrs</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    :root {
      --black: #000000;
      --white: #ffffff;
      --gray:  #555555;
      --light: #f8f8f8;
      --radius: 18px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0,0,0,0.06) 1px, transparent 1px),
        radial-gradient(circle at 90% 80%, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 24px 24px, 24px 24px;
      min-height: 100vh;
      padding: 60px 16px 160px;
    }

    .container {
      max-width: 440px;
      margin: 0 auto;
    }

    .profile {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeInUp 1s ease-out;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto 16px;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 5px solid var(--black);
      object-fit: cover;
      background: var(--black);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .username {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--black);
    }

    .description {
      font-size: 1rem;
      color: var(--gray);
      margin-top: 8px;
      line-height: 1.4;
    }

    .section {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--black);
      margin: 0 0 16px;
      text-align: center;
      letter-spacing: -0.5px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease-out forwards;
    }

    /* Delay section title */
    .social-section .section-title { animation-delay: 0.4s; }
    .contact-section .section-title { animation-delay: 1.2s; }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: var(--white);
      border: 2.5px solid var(--black);
      border-radius: var(--radius);
      box-shadow: 5px 5px 0 var(--black);
      text-decoration: none;
      color: var(--black);
      font-size: 1.08rem;
      font-weight: 600;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
      animation: slideUpBtn 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
      transition: all 0.28s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUpBtn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Delay tombol per section */
    .social-section .btn:nth-child(1) { animation-delay: 0.7s; }
    .social-section .btn:nth-child(2) { animation-delay: 0.9s; }

    .contact-section .btn:nth-child(1) { animation-delay: 1.5s; }
    .contact-section .btn:nth-child(2) { animation-delay: 1.7s; }

    .btn:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 10px 10px 0 var(--black);
      background: var(--light);
    }

    .btn-icon {
      font-size: 1.6rem;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: var(--black);
      color: var(--white);
      transition: all 0.3s ease;
    }

    .btn:hover .btn-icon {
      transform: rotate(8deg) scale(1.1);
      background: #111;
    }

    .btn-text {
      flex: 1;
    }

    .btn-arrow {
      font-size: 1.4rem;
      color: var(--gray);
      transition: all 0.3s ease;
      margin-left: 8px;
    }

    .btn:hover .btn-arrow {
      color: var(--black);
      transform: translateX(6px);
    }

    .footer {
      text-align: center;
      margin-top: 60px;
      font-size: 0.88rem;
      color: #666;
      letter-spacing: 0.5px;
      animation: fadeInUp 1s ease-out 2.2s both;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="profile">
    <div class="avatar-wrap">
      <img src="https://files.catbox.moe/drn6kg.jpg" alt="@reicdrs" class="avatar">
    </div>
    <h1 class="username">@reicdrs</h1>
    <p class="description">Official NekoBot – Bot WhatsApp multifungsi untuk hiburan, info, dan komunitas.</p>
  </div>

  <div class="section social-section">
    <div class="section-title">Social Media</div>
    <div class="links">
      <a href="https://chat.whatsapp.com/CFkJib3yOhhLWYMtIZLMdY?mode=hq2tcla" class="btn" target="_blank">
        <div style="display: flex; align-items: center; gap: 16px;">
          <div class="btn-icon"><i class="fab fa-whatsapp"></i></div>
          <div class="btn-text">NekoBot - Group Officials</div>
        </div>
        <i class="fa-solid fa-arrow-right btn-arrow"></i>
      </a>

      <a href="https://whatsapp.com/channel/0029VbC7SGt65yDCUxYwUS3U" class="btn" target="_blank">
        <div style="display: flex; align-items: center; gap: 16px;">
          <div class="btn-icon"><i class="fab fa-whatsapp"></i></div>
          <div class="btn-text">NekoBot - Saluran Officials</div>
        </div>
        <i class="fa-solid fa-arrow-right btn-arrow"></i>
      </a>
    </div>
  </div>

  <div class="section contact-section">
    <div class="section-title">Contact Admin</div>
    <div class="links">
      <a href="https://t.me/reicdrs" class="btn" target="_blank">
        <div style="display: flex; align-items: center; gap: 16px;">
          <div class="btn-icon"><i class="fab fa-telegram"></i></div>
          <div class="btn-text">Telegram</div>
        </div>
        <i class="fa-solid fa-arrow-right btn-arrow"></i>
      </a>

      <a href="https://wa.me/6282322962313" class="btn" target="_blank">
        <div style="display: flex; align-items: center; gap: 16px;">
          <div class="btn-icon"><i class="fab fa-whatsapp"></i></div>
          <div class="btn-text">WhatsApp</div>
        </div>
        <i class="fa-solid fa-arrow-right btn-arrow"></i>
      </a>
    </div>
  </div>

  <div class="footer">
    © NekoBot - @reicdrs
  </div>

</div>

</body>
</html>
